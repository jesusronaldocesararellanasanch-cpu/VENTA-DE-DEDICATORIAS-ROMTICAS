<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Romántico con Estrellas y Corazones</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }
        
        /* Estrellas de fondo */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle 1s infinite alternate;
        }
        
        /* Estrellas fugaces mejoradas */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, #fff 50%, rgba(255,255,255,0) 100%);
            transform-origin: left center;
            z-index: 1;
            animation: shooting 3s linear infinite;
        }
        
        .shooting-star::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px #fff;
        }
        
        /* Corazones flotantes */
        .heart {
            position: absolute;
            font-size: 30px;
            color: #ff4d6d;
            cursor: pointer;
            z-index: 2;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.7);
            animation: float 4s ease-in-out infinite;
            transition: transform 0.3s;
            user-select: none;
            pointer-events: auto;
        }
        
        .heart:hover {
            transform: scale(1.3);
        }
        
        /* Mensajes románticos */
        .love-message {
            position: absolute;
            color: #ffccd5;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            max-width: 200px;
            text-shadow: 0 0 5px rgba(255, 204, 213, 0.8);
            animation: message-float 4s forwards;
            z-index: 3;
            pointer-events: none;
        }
        
        /* Animaciones */
        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        @keyframes shooting {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateX(100vw) translateY(100vh) rotate(45deg);
                opacity: 0;
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(-5deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
        
        @keyframes message-float {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translateY(-30px) scale(1.2);
            }
            80% {
                opacity: 1;
                transform: translateY(-60px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-90px) scale(1.5);
            }
        }
        
        /* Texto central */
        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff758f;
            font-size: 3rem;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 117, 143, 0.7);
            z-index: 1;
            animation: pulse 2s infinite alternate;
        }
        
        .instructions {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffccd5;
            font-size: 1.2rem;
            text-align: center;
            z-index: 1;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars-container"></div>
    <h1 class="title">Mi Amor por Ti</h1>
    <div class="instructions">Toca los corazones para ver mensajes de amor</div>
    
    <script>
        // Frases románticas
        const romanticPhrases = [
            "Eres el amor de mi vida",
            "Mi corazón late por ti",
            "Eres mi sueño hecho realidad",
            "Contigo el tiempo vuela",
            "Tu sonrisa ilumina mi día",
            "Eres mi razón de ser",
            "Amo cada momento a tu lado",
            "Eres perfecto/a para mí",
            "Mi amor por ti crece cada día",
            "Eres la persona más especial",
            "Eres mi felicidad",
            "Mi vida tiene sentido contigo",
            "Eres mi estrella más brillante",
            "Te amaré por siempre",
            "Eres mi mejor regalo",
            "Contigo quiero envejecer",
            "Eres mi pensamiento favorito",
            "Tu amor es mi fortaleza",
            "Eres mi lugar seguro",
            "No existe un 'yo' sin ti"
        ];
        
        // Crear estrellas de fondo
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Posición y tamaño aleatorio
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                
                // Animación con delay aleatorio
                star.style.animationDelay = `${Math.random() * 2}s`;
                star.style.animationDuration = `${1 + Math.random() * 2}s`;
                
                container.appendChild(star);
            }
        }
        
        // Crear estrellas fugaces
        function createShootingStars() {
            const container = document.body;
            
            function addShootingStar() {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                
                // Posición inicial aleatoria
                const startX = Math.random() * 20;
                const startY = Math.random() * 20;
                
                shootingStar.style.left = `${startX}vw`;
                shootingStar.style.top = `${startY}vh`;
                
                // Ángulo y duración aleatoria
                const angle = -30 + Math.random() * 60;
                const duration = 2 + Math.random() * 3;
                
                shootingStar.style.transform = `rotate(${angle}deg)`;
                shootingStar.style.animationDuration = `${duration}s`;
                
                container.appendChild(shootingStar);
                
                // Eliminar después de la animación
                setTimeout(() => {
                    shootingStar.remove();
                }, duration * 1000);
            }
            
            // Crear una estrella fugaz cada 1-3 segundos
            setInterval(addShootingStar, 1000);
            addShootingStar(); // Primera estrella
        }
        
        // Crear corazones flotantes
        function createHearts() {
            const heartCount = 15;
            
            for (let i = 0; i < heartCount; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 800);
            }
        }
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            
            // Posición inicial aleatoria
            heart.style.left = `${10 + Math.random() * 80}vw`;
            heart.style.top = `${20 + Math.random() * 60}vh`;
            
            // Tamaño aleatorio
            const size = 20 + Math.random() * 30;
            heart.style.fontSize = `${size}px`;
            
            // Animación de flotar
            const floatTime = 8 + Math.random() * 7;
            heart.style.animationDuration = `${floatTime}s`;
            
            // Al hacer clic/touch en el corazón
            heart.addEventListener('click', function(e) {
                showRomanticMessage(heart);
                animateHeartExplosion(heart);
            });
            
            // Para dispositivos táctiles
            heart.addEventListener('touchstart', function(e) {
                e.preventDefault();
                showRomanticMessage(heart);
                animateHeartExplosion(heart);
            });
            
            document.body.appendChild(heart);
        }
        
        function animateHeartExplosion(heart) {
            // Efecto de explosión
            heart.style.transition = 'all 0.5s';
            heart.style.transform = 'scale(2)';
            heart.style.opacity = '0';
            
            // Eliminar después de la animación
            setTimeout(() => {
                heart.remove();
                
                // Crear nuevo corazón después de un tiempo
                setTimeout(createHeart, 2000 + Math.random() * 3000);
            }, 500);
        }
        
        // Mostrar mensaje romántico
        function showRomanticMessage(heart) {
            const rect = heart.getBoundingClientRect();
            const message = document.createElement('div');
            message.className = 'love-message';
            
            // Seleccionar frase aleatoria
            const randomIndex = Math.floor(Math.random() * romanticPhrases.length);
            message.textContent = romanticPhrases[randomIndex];
            
            // Posicionar donde estaba el corazón
            message.style.left = `${rect.left + rect.width / 2}px`;
            message.style.top = `${rect.top}px`;
            
            document.body.appendChild(message);
            
            // Eliminar después de la animación
            setTimeout(() => {
                message.remove();
            }, 4000);
        }
        
        // Inicializar todo cuando se carga la página
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
            createShootingStars();
            createHearts();
        });
        
        // Para dispositivos móviles
        window.addEventListener('touchstart', function() {}, {passive: true});
    </script>
</body>
</html>
